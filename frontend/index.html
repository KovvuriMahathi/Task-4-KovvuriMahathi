<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container mt-4">

        <!-- Navbar -->
        <nav class="navbar navbar-dark bg-primary rounded shadow mb-4">
            <div class="container-fluid">
                <span class="navbar-brand mx-auto fs-3 fw-bold">
                    <i class="bi bi-people-fill"></i>
                    Intern Management System
                </span>
            </div>
        </nav>

        <!-- Dashboard Cards -->
        <div class="row mb-4">

            <div class="col-md-4 mb-3">
                <div class="card text-center bg-primary text-white shadow">
                    <div class="card-body">
                        <i class="bi bi-people-fill fs-1"></i>
                        <h5>Total Interns</h5>
                        <h2 id="totalInterns">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card text-center bg-success text-white shadow">
                    <div class="card-body">
                        <i class="bi bi-building fs-1"></i>
                        <h5>Departments</h5>
<h2 id="totalDepartments">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card text-center bg-warning shadow">
                    <div class="card-body">
                        <i class="bi bi-check-circle-fill fs-1"></i>
                        <h5>Status</h5>
                        <h2>Active</h2>
                    </div>
                </div>
            </div>

        </div>

        <div class="row">

            <!-- Left Panel -->
            <div class="col-lg-4 mb-4">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white">
                        <i class="bi bi-person-plus-fill"></i>
                        Add / Update Intern
                    </div>

                    <div class="card-body">

                        <div class="mb-3">
                            <label class="form-label">Name</label>

                            <input
                                type="text"
                                id="name"
                                class="form-control"
                                placeholder="Enter Name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Department</label>

                            <input
                                type="text"
                                id="department"
                                class="form-control"
                                placeholder="Enter Department">
                        </div>

                        <button
                            id="addBtn"
                            class="btn btn-success w-100">

                            <i class="bi bi-plus-circle"></i>
                            Add Intern

                        </button>

                        <button
                            id="loadBtn"
                            class="btn btn-primary w-100 mt-2">

                            <i class="bi bi-arrow-repeat"></i>
                            Load Interns

                        </button>

                    </div>

                </div>

            </div>

            <!-- Right Panel -->
            <div class="col-lg-8">

                <div class="card shadow">

                    <div class="card-header bg-dark text-white">

                        <i class="bi bi-table"></i>

                        Intern List

                    </div>

                    <div class="card-body">

                        <div class="input-group mb-3">

                            <span class="input-group-text">
                                <i class="bi bi-search"></i>
                            </span>

                            <input
                                type="text"
                                id="search"
                                class="form-control"
                                placeholder="Search Intern">

                        </div>

                        <div class="table-responsive">

                            <table class="table table-hover table-striped table-bordered">

                                <thead class="table-primary">

                                    <tr>

                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Department</th>
                                        <th>Actions</th>

                                    </tr>

                                </thead>

                                <tbody id="internList">

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
